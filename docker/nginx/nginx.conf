server {
    listen 80;
    server_name rinchinovab.ru www.rinchinovab.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rinchinovab.ru www.rinchinovab.ru;

    ssl_certificate /etc/letsencrypt/live/rinchinovab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rinchinovab.ru/privkey.pem;

    root /var/www/html/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ \.php$ {
        return 404;
    }
}
